<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>적당한 스팸 체크기 (AI Spam Checker)</title>
</head>
<body>
  <h1>스팸 판별기</h1>

  <textarea id="text" rows="6" cols="80">Prize Winner</textarea>
  <br>
  <button onclick="classify()">스팸 탐지</button>

  <p id="result">결과가 여기에 표시됩니다.</p>

  <script>
    function classify() {
      const text = document.getElementById("text").value;

      fetch("/classify", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
      })
      .then(res => res.json())
      .then(data => {
        let lines = [];

        lines.push("결과: " + data.label + " (score=" + data.score + ")");

        if (data.model_info) {
          lines.push("모델: " + data.model_info.model_type);
          lines.push("Test Acc: " + data.model_info.test_accuracy);
          lines.push("Run ID: " + data.model_info.run_id);
        }

        if (data.error) {
          lines.push("Error: " + data.error);
        }

        document.getElementById("result").innerText = lines.join("\n");
      })
      .catch(err => {
        document.getElementById("result").innerText = "에러 발생: " + err;
      });
    }
  </script>
</body>
</html>
