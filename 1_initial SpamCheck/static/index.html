<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Spam 판별기</title>
</head>

<body>
    <h1>AI Spam Checker</h1>

    <textarea id="text" rows="5" cols="60" placeholder="문장을 입력하세요."></textarea><br><br>

    <button onclick="classify()">스팸 판별기 입니다.</button>
    <h3 id="result"></h3>

    <script>
        function classify() {
            const text = document.getElementById("text").value;
            const result = document.getElementById("result");

            if (!text) {
                result.innerText = "메시지를 입력해 주세요!";
                return;
            }

            fetch("/classify", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text })
            })
                .then(response => response.json())
                .then(data => {
                    result.innerText = `결과: ${data.label} (score=${data.score})`;
                });
        }
    </script>
</body>

</html>
